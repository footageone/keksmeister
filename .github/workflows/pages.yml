name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build library
        run: bun run build

      - name: Build docs
        run: bun run build:docs

      - name: Prepare demo page
        run: |
          mkdir -p _site
          cp demo/index.html _site/index.html
          sed -i "s|../src/index.ts|./keksmeister.js|" _site/index.html
          cp dist/keksmeister.js _site/keksmeister.js
          cp dist/keksmeister.js.map _site/keksmeister.js.map
          cp assets/keksmeister-logo.jpg _site/keksmeister-logo.jpg

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
