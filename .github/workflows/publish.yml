name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          # Do NOT set token here — OIDC Trusted Publishers handle auth
          token: ''

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      # Uses npm Trusted Publishers (OIDC) — no NPM_TOKEN needed.
      # Configure at: npmjs.com → Package Settings → Trusted Publishers
      # First publish must be done manually: npm login && npm publish --provenance --access public
      - name: Publish
        run: npm publish --provenance --access public
