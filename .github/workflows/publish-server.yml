name: Publish consent-log image

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set up QEMU (multi-arch emulation)
        run: docker run --privileged --rm tonistiigi/binfmt --install arm64,amd64

      - name: Set up Buildx
        run: |
          docker buildx create --use --name keksmeister-builder
          docker buildx inspect --bootstrap

      - name: Compute image tags
        id: meta
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/keksmeister-consent-log"
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
            TAGS="$IMAGE:$VERSION,$IMAGE:latest"
          else
            TAGS="$IMAGE:edge"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Publishing: $TAGS"

      - name: Build and push
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.meta.outputs.tags }}"
          ARGS=()
          for t in "${TAGS[@]}"; do ARGS+=(--tag "$t"); done
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            "${ARGS[@]}" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.description=Keksmeister consent logging server" \
            --push \
            ./server
